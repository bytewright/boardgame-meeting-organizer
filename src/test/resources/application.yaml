spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password: password
    driverClassName: org.h2.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
vaadin:
  launch-browser: false
bgmo:
  adapter:
    bot:
      telegram:
        enabled: false
        bot-token: "a long token"
        bot-username: "some user name"
        group-chat-id: "-1234567"
        group-locale: DE
  core.services:
    base-url: "http://some-domain.org/"
    automation-autostart: false
    security-pw-pepper: "testPepper"
    profanityFilterListPath: "./src/main/resources/blocklists/de_profanity"
