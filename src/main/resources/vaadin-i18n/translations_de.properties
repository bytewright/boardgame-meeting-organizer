register.contactinfo.section.title=Wie deine Kontaktdaten verwendet werden
register.contactinfo.explainer=Diese Plattform hat kein internes Nachrichtensystem. \
  Wenn du an einem Meetup teilnimmst oder eines organisierst, wird deine primäre \
  Kontaktoption mit den anderen Beteiligten geteilt, damit ihr euch außerhalb \
  der Plattform koordinieren könnt. Deine Kontaktdaten kannst du direkt nach der \
  Registrierung in deinem Profil hinterlegen - ein kurzer Schritt, der dir vollen \
  Zugriff auf alle Plattformfunktionen freischaltet.
