register.consent.notice=Mit dem Erstellen eines Kontos bestätigst du, dass deine primäre \
  Kontaktoption bei Meetup-Teilnahmen oder Meetup-Organisation mit den anderen Beteiligten geteilt werden darf, \
  wie oben beschrieben. Die Webseite gibt keine Daten an andere Dritte weiter.
register.consent.label=Ich habe die Datenschutzerklärung gelesen und stimme der \
