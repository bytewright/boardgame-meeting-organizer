databaseChangeLog:
  - changeSet:
      id: 20260514-1
      author: bytewright
      changes:
        - createTable:
            tableName: scheduled_tasks
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_scheduled_tasks
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: modified_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: ts_due_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: stuck_timeout
                  type: BIGINT
                  remarks: "Duration stored in nanoseconds"
                  constraints:
                    nullable: false
              - column:
                  name: idempotency_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: task_state
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                    checkConstraint: "task_state IN ('PENDING', 'EXECUTING', 'FINISHED', 'ERROR')"
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            columnNames: idempotency_key
            constraintName: UC_SCHEDULED_TASK_KEY
            tableName: scheduled_tasks