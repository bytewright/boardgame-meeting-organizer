spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  messages:
    basename: vaadin-i18n/translations
  profiles:
    active: local # Use gitignored other application-local.yaml
vaadin:
  launch-browser: true
bgmo:
  adapter:
    bot:
      telegram:
        bot-token: "${TELEGRAM_BOT_TOKEN:}"
        bot-username: "${TELEGRAM_BOT_USERNAME:}"
        group-chat-id: "${TELEGRAM_BOT_GRP_CHAT_ID:}"
        group-locale: DE
  core.services:
    base-url: "http://some-domain.org/"
    automation-autostart: false
