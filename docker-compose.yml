services:
  # this is only for local dev
  bgmo-db:
    image: postgres:18-alpine
    container_name: bgmo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bgmo_db
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpassword
    volumes:
      - bgmo_pg_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d bgmo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bgmo_pg_data: